# ============================================
# WorkTrack v2 - 飞牛 NAS Docker Compose 部署文件
# ============================================
# 使用方法：
#   1. 将此文件和 .env.nas 放入 NAS 的同一目录
#   2. 编辑 .env.nas 填写必要配置（特别是 LLM_API_KEY 和 JWT_SECRET_KEY）
#   3. 启动：docker compose -f docker-compose.nas.yml --env-file .env.nas up -d
#   4. 停止：docker compose -f docker-compose.nas.yml down
#   5. 更新：docker compose -f docker-compose.nas.yml pull && docker compose -f docker-compose.nas.yml --env-file .env.nas up -d
# ============================================

services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: worktrack-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-worktrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worktrack}
      POSTGRES_DB: ${DB_NAME:-worktrack}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-worktrack} -d ${DB_NAME:-worktrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== WorkTrack 应用（后端 + 前端 Nginx 单容器）=====
  worktrack:
    image: zxt815/worktrack-v2:latest
    container_name: worktrack-app
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-worktrack}
      - DB_PASSWORD=${DB_PASSWORD:-worktrack}
      - DB_NAME=${DB_NAME:-worktrack}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-deepseek-chat}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-3-small}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - AUTO_CREATE_ADMIN=false
    volumes:
      - ./worktrack_data:/app/data
      - ./worktrack_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
