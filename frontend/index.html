<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      主题初始化脚本：同步执行，在任何 DOM 渲染前设定 data-theme
      这样 Tailwind dark: 变体在首次渲染就能正确生效，避免主题闪烁（FOSC）
      同时接管系统 prefers-color-scheme 监听，实现真正的系统自动跟随
    -->
    <script>
      (function () {
        function applyTheme(pref) {
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : (pref || 'dark');
          document.documentElement.setAttribute('data-theme', resolved);
          return resolved;
        }

        var pref = localStorage.getItem('theme') || 'dark';
        applyTheme(pref);

        // 系统主题变化监听（系统模式下实时跟随）
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
          if (localStorage.getItem('theme') === 'system') {
            document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          }
        });
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <!-- iOS Web App Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorkTrack" />
    <meta name="format-detection" content="telephone=no" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/api/v1/settings/branding/manifest" />
    <!-- 客户 logo CDN 预连接：首屏建立 TCP/TLS，后续直接复用 -->
    <link rel="preconnect" href="https://logo.clearbit.com" crossorigin />
    <link rel="dns-prefetch" href="https://logo.clearbit.com" />
    <link rel="dns-prefetch" href="https://icons.duckduckgo.com" />
    <title>WorkTrack</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
