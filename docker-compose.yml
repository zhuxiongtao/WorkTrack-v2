services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-worktrack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worktrack}
      POSTGRES_DB: ${DB_NAME:-worktrack}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # 如需外部访问数据库（开发调试用）：
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-worktrack} -d ${DB_NAME:-worktrack}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===== WorkTrack 应用（后端 + 前端 Nginx 单容器）=====
  worktrack:
    build: .
    ports:
      - "80:80"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-worktrack}
      - DB_PASSWORD=${DB_PASSWORD:-worktrack}
      - DB_NAME=${DB_NAME:-worktrack}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-3-small}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - AUTO_CREATE_ADMIN=false     # 生产环境通过初始化向导创建管理员
    volumes:
      - worktrack_data:/app/data       # ChromaDB 向量、音频文件持久化
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  worktrack_data:
