services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worktrack
      POSTGRES_PASSWORD: worktrack
      POSTGRES_DB: worktrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worktrack -d worktrack"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  worktrack:
    build: .
    ports:
      - "8080:80"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=worktrack
      - DB_PASSWORD=worktrack
      - DB_NAME=worktrack
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-deepseek-chat}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-3-small}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=*
      - AUTO_CREATE_ADMIN=true
    volumes:
      - worktrack_data:/app/data
      - worktrack_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  worktrack_data:
  worktrack_uploads:
