services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worktrack
      POSTGRES_PASSWORD: worktrack
      POSTGRES_DB: worktrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worktrack -d worktrack"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
